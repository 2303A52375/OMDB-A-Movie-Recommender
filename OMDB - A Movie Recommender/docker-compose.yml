version: '3.9'

services:
  # ── MongoDB ────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: movie_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: movie_recommender
    networks:
      - movie_net

  # ── Backend API ────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: movie_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/movie_recommender
      JWT_SECRET: change_this_in_production_super_secret_key
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongo
    networks:
      - movie_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: movie_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - movie_net

volumes:
  mongo_data:
    driver: local

networks:
  movie_net:
    driver: bridge
